# Harvest a repo's GitHub secrets + vars into OpenBao (kv/github/<org>/<repo>/*).
# Pilot: ever-co/ever-teams. Dispatch-only; runs in-cluster on ARC and reaches OpenBao internally.
# Identity = the repo (GitHub OIDC claim `repository`), scoped by the OpenBao jwt role.
# Safety: the jwt token can ONLY write kv/github/ever-co/ever-teams/* — it is proven DENIED on the
# app runtime trees kv/ever-teams/* and kv/ever-gauzy/* before anything is written. Values are never logged.
#
# To reuse for another repo: change ROLE + DEST to that repo (and create its OpenBao policy+role first).
name: harvest-secrets-to-openbao
on:
  workflow_dispatch: {}
permissions:
  id-token: write     # for GitHub OIDC
  contents: read
jobs:
  harvest:
    runs-on: ever-k8s-linux-x64-4    # in-cluster ARC (4-vCPU pool) -> internal OpenBao
    env:
      OPENBAO_ADDR: http://openbao-active.openbao.svc.cluster.local:8200
      OIDC_AUDIENCE: openbao-github-oidc
    steps:
      - name: Harvest to OpenBao (OIDC login -> prove isolation -> write)
        uses: actions/github-script@v7
        env:
          ALL_SECRETS: ${{ toJSON(secrets) }}
          ALL_VARS: ${{ toJSON(vars) }}
        with:
          script: |
            const addr = process.env.OPENBAO_ADDR;
            // Generic: derive the per-repo jwt role + dest path from the repo itself.
            const repo = process.env.GITHUB_REPOSITORY;         // e.g. ever-co/ever-gauzy
            const ROLE = repo.replace('/', '-');                 // e.g. ever-co-ever-gauzy
            const DEST = `github/${repo}`;                       // e.g. github/ever-co/ever-gauzy
            // 1. GitHub OIDC token for the OpenBao audience
            const jwt = await core.getIDToken(process.env.OIDC_AUDIENCE);
            core.setSecret(jwt);
            // 2. Exchange it for a short-lived OpenBao token via the per-repo jwt role
            let r = await fetch(`${addr}/v1/auth/jwt/login`, {
              method: 'POST', headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ role: ROLE, jwt })
            });
            if (!r.ok) { core.setFailed(`jwt login failed: HTTP ${r.status} ${await r.text()}`); return; }
            const baoToken = (await r.json()).auth.client_token;
            core.setSecret(baoToken);
            const H = { 'X-Vault-Token': baoToken, 'Content-Type': 'application/json' };
            // 3. PROVE ISOLATION: this token must be DENIED (403) on app runtime trees + other repos
            // app runtime trees (always forbidden to any harvest role) + a synthetic other-repo path
            for (const p of ['kv/data/ever-teams/prod/api', 'kv/data/ever-gauzy/prod/api', 'kv/data/github/ever-co/__isolation_probe__/secrets']) {
              const rr = await fetch(`${addr}/v1/${p}`, { headers: H });
              core.info(`isolation check: read ${p} -> HTTP ${rr.status} (expect 403)`);
              if (rr.status !== 403) { core.setFailed(`ISOLATION FAIL: ${p} returned ${rr.status}, expected 403`); return; }
            }
            core.info('isolation OK: denied on kv/ever-teams/*, kv/ever-gauzy/*, and other repo paths');
            // 4. Collect secrets + vars, strip the auto GITHUB_TOKEN, write to this repo's harvest path
            const secrets = JSON.parse(process.env.ALL_SECRETS || '{}');
            delete secrets.github_token; delete secrets.GITHUB_TOKEN;
            const vars = JSON.parse(process.env.ALL_VARS || '{}');
            const sKeys = Object.keys(secrets).sort(), vKeys = Object.keys(vars).sort();
            core.info(`harvesting ${sKeys.length} secrets, ${vKeys.length} vars from ${process.env.GITHUB_REPOSITORY}`);
            let w = await fetch(`${addr}/v1/kv/data/${DEST}/secrets`, { method: 'POST', headers: H, body: JSON.stringify({ data: secrets }) });
            if (!w.ok) { core.setFailed(`write secrets failed: HTTP ${w.status} ${await w.text()}`); return; }
            let wv = await fetch(`${addr}/v1/kv/data/${DEST}/vars`, { method: 'POST', headers: H, body: JSON.stringify({ data: vars }) });
            if (!wv.ok) { core.setFailed(`write vars failed: HTTP ${wv.status} ${await wv.text()}`); return; }
            // 5. Log KEY NAMES only (never values)
            core.info(`DONE: wrote kv/${DEST}/secrets (${sKeys.length} keys) + /vars (${vKeys.length} keys)`);
            core.info('secret keys: ' + (sKeys.join(', ') || '(none)'));
            core.info('var keys: ' + (vKeys.join(', ') || '(none)'));

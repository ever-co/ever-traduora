version: 2
updates:
  - package-ecosystem: "npm"
    directories:
      - "/"
      - "/api"
      - "/webapp"
      - "/docs-website"
    open-pull-requests-limit: 10
    schedule:
      interval: "monthly"
    groups:
      npm-minor-and-patch:
        applies-to: version-updates
        update-types: ["minor", "patch"]
      npm-major:
        applies-to: version-updates
        update-types: ["major"]
      npm-security:
        applies-to: security-updates
        patterns: ["*"]
  - package-ecosystem: "github-actions"
    directory: "/"
    open-pull-requests-limit: 5
    schedule:
      interval: "monthly"
    groups:
      github-actions:
        patterns: ["*"]